<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home IoT - Home</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="top-navbar">
        <div class="nav-left">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-layer-group"></i> SMART HOME IOT
            </a>
            <ul class="nav-links">
                <li>
                    <div class="nav-item-wrap active">
                        <a href="index.html" class="nav-item">DASHBOARD</a>
                    </div>
                </li>
                <li>
                    <div class="nav-item-wrap">
                        <a href="pages/device_manager/index.html" class="nav-item">DEVICE MANAGER</a>
                    </div>
                </li>
                <li>
                    <div class="nav-item-wrap">
                        <a href="pages/datasensor/index.html" class="nav-item">DATA SENSOR</a>
                    </div>
                </li>
                <li>
                    <div class="nav-item-wrap">
                        <a href="pages/history/index.html" class="nav-item">ACTION HISTORY</a>
                    </div>
                </li>
            </ul>
        </div>
        <div class="nav-right">
            <a href="pages/profile/index.html" class="user-profile-link">
                <div class="name">Lê Xuân Trường</div>
                <div class="avatar">T</div>
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="grid-system">
            <div class="sensor-card-wrapper">
                <div class="mech-card" id="card-temp">
                    <div class="card-left">
                        <div class="card-title">NHIỆT ĐỘ</div>
                        <div class="card-value-box">
                            <span id="val-temp">--</span><span class="unit">°C</span>
                        </div>
                    </div>
                    <div class="card-right"><i class="fa-solid fa-temperature-three-quarters"></i></div>
                </div>
            </div>

            <div class="sensor-card-wrapper">
                <div class="mech-card" id="card-humid">
                    <div class="card-left">
                        <div class="card-title">ĐỘ ẨM</div>
                        <div class="card-value-box">
                            <span id="val-humid">--</span><span class="unit">%</span>
                        </div>
                    </div>
                    <div class="card-right"><i class="fa-solid fa-droplet"></i></div>
                </div>
            </div>

            <div class="sensor-card-wrapper">
                <div class="mech-card" id="card-light">
                    <div class="card-left">
                        <div class="card-title">ÁNH SÁNG</div>
                        <div class="card-value-box">
                            <span id="val-light">--</span><span class="unit">Lux</span>
                        </div>
                    </div>
                    <div class="card-right"><i class="fa-solid fa-sun"></i></div>
                </div>
            </div>
        </div>

        <div class="bottom-section">
            <div class="tech-panel-wrapper">
                <div class="top-bar-area">
                    <div class="panel-title-container">BIỂU ĐỒ GIÁM SÁT</div>
                    <div class="white-filler"></div>
                </div>
                <div class="panel-main-body chart-wrapper">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
            
            <div class="tech-panel-wrapper">
                <div class="top-bar-area">
                    <div class="panel-title-container">BẢNG ĐIỀU KHIỂN</div>
                    <div class="white-filler"></div>
                </div>
                <div class="panel-main-body control-grid">
                    
                    <div class="btn-wrapper" id="wrap-fan">
                        <div class="control-btn" onclick="toggleDevice('D1', 'fan')">
                            <div class="btn-icon-area">
                                <img src="images/Fan.svg" alt="Fan">
                            </div>
                            <div class="btn-info">
                                <div class="device-name">QUẠT THÔNG HƠI</div>
                                <div class="device-status">Đang tải...</div>
                            </div>
                            <div class="btn-action">
                                <img src="images/StatusOff.svg" class="status-icon icon-off">
                                <img src="images/StatusLoad.svg" class="status-icon icon-load">
                                <img src="images/StatusOn.svg" class="status-icon icon-on">
                            </div>
                        </div>
                    </div>

                    <div class="btn-wrapper" id="wrap-lamp1">
                        <div class="control-btn" onclick="toggleDevice('D2', 'lamp1')">
                            <div class="btn-icon-area">
                                <img src="images/Light1.svg" alt="Chandelier">
                            </div>
                            <div class="btn-info">
                                <div class="device-name">ĐÈN CHÙM</div>
                                <div class="device-status">Đang tải...</div>
                            </div>
                            <div class="btn-action">
                                <img src="images/StatusOff.svg" class="status-icon icon-off">
                                <img src="images/StatusLoad.svg" class="status-icon icon-load">
                                <img src="images/StatusOn.svg" class="status-icon icon-on">
                            </div>
                        </div>
                    </div>

                    <div class="btn-wrapper" id="wrap-lamp2">
                        <div class="control-btn" onclick="toggleDevice('D3', 'lamp2')">
                            <div class="btn-icon-area">
                                <img src="images/Light2.svg" alt="Light">
                            </div>
                            <div class="btn-info">
                                <div class="device-name">ĐÈN HUỲNH QUANG</div>
                                <div class="device-status">Đang tải...</div>
                            </div>
                            <div class="btn-action">
                                <img src="images/StatusOff.svg" class="status-icon icon-off">
                                <img src="images/StatusLoad.svg" class="status-icon icon-load">
                                <img src="images/StatusOn.svg" class="status-icon icon-on">
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script src="dashboard.js?v=2"></script>
</body>
</html>
