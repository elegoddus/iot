<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>IOT Dashboard - Lịch Sử</title>
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <nav class="top-navbar">
        <div class="nav-left">
            <a href="../../index.html" class="logo"><i class="fa-solid fa-layer-group"></i> IOT DASHBOARD</a>
            <ul class="nav-links">
                <li>
                    <div class="nav-item-wrap">
                        <a href="../../index.html" class="nav-item">DASHBOARD</a>
                    </div>
                </li>
                <li>
                    <div class="nav-item-wrap">
                        <a href="../datasensor/index.html" class="nav-item">DATA SENSOR</a>
                    </div>
                </li>
                <li>
                    <div class="nav-item-wrap active">
                        <a href="index.html" class="nav-item">ACTION HISTORY</a>
                    </div>
                </li>
            </ul>
        </div>
        <div class="nav-right">
            <a href="../profile/index.html" class="user-profile-link">
                <div class="name">Lê Xuân Trường</div>
                <div class="avatar">T</div>
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="tech-panel-wrapper">
            <div class="top-bar-area">
                <div class="panel-title-container">NHẬT KÝ ĐIỀU KHIỂN</div>
                
                <div class="white-filler">
                    <div class="rows-selector">
                        <label>Hiển thị:</label>
                        <select id="rows-history" class="custom-select">
                            <option value="10" selected>10 hàng</option>
                            <option value="20">20 hàng</option>
                        </select>
                    </div>

                    <div class="filter-box">
                        <select id="filter-device" class="custom-select">
                            <option value="all">Tất cả thiết bị</option>
                            <option value="fan">Quạt thông hơi</option>
                            <option value="lamp">Đèn chùm</option>
                            <option value="ac">Đèn huỳnh quang</option>
                        </select>

                        <select id="filter-action" class="custom-select">
                            <option value="all">Mọi hành động</option>
                            <option value="TURN_ON">Mở (ON)</option>
                            <option value="TURN_OFF">Tắt (OFF)</option>
                        </select>

                        <select id="filter-status" class="custom-select">
                            <option value="all">Mọi trạng thái</option>
                            <option value="SUCCESS">Thành công</option>
                            <option value="FAILED">Thất bại / Lỗi</option>
                            <option value="PROCESSING">Đang tải</option>
                        </select>

                        <input type="text" id="search-history" class="custom-input" placeholder="Tìm ID hoặc Thời gian...">
                        
                        <button class="btn-search" id="btn-search">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="panel-main-body">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Thiết bị</th>
                            <th>Hành động</th>
                            <th>Trạng thái</th>
                            <th>Thời gian</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body"></tbody>
                </table>
            </div>
            
            <div class="pagination">
                <span class="page-item" id="btn-prev">Prev</span>
                <span class="page-info" id="page-info">Trang 1</span>
                <span class="page-item" id="btn-next">Next</span>
            </div>
        </div>
    </div>
    <script src="script.js?v=2"></script>
</body>
</html>
