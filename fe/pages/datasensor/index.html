<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home IoT - Dữ Liệu Cảm Biến</title>
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <nav class="top-navbar">
        <div class="nav-left">
            <a href="../../index.html" class="logo"><i class="fa-solid fa-layer-group"></i> SMART HOME IOT</a>
            <ul class="nav-links">
                <li>
                    <div class="nav-item-wrap">
                        <a href="../../index.html" class="nav-item">DASHBOARD</a>
                    </div>
                </li>
                <li>
                    <div class="nav-item-wrap active">
                        <a href="index.html" class="nav-item">DATA SENSOR</a>
                    </div>
                </li>
                <li>
                    <div class="nav-item-wrap">
                        <a href="../history/index.html" class="nav-item">ACTION HISTORY</a>
                    </div>
                </li>
            </ul>
        </div>
        <div class="nav-right">
            <a href="../profile/index.html" class="user-profile-link">
                <div class="name">Lê Xuân Trường</div>
                <div class="avatar">T</div>
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="tech-panel-wrapper">
            <div class="top-bar-area">
                <div class="panel-title-container">LỊCH SỬ DỮ LIỆU CẢM BIẾN</div>
                
                <div class="white-filler">
                    <div class="rows-selector">
                        <label>Hiển thị:</label>
                        <select id="rows-per-page" class="custom-select">
                            <option value="10" selected>10 hàng</option>
                            <option value="20">20 hàng</option>
                            <option value="50">50 hàng</option>
                        </select>
                    </div>

                    <div class="filter-box">
                        <select id="filter-type" class="custom-select">
                            <option value="all">Tất cả cảm biến</option>
                            <option value="temp">Nhiệt độ</option>
                            <option value="humid">Độ ẩm</option>
                            <option value="light">Ánh sáng</option>
                        </select>
                        
                        <input type="text" id="search-input" class="custom-input" placeholder="Nhập Trị số, Cảm biến, Thời gian...">
                        
                        <button class="btn-search" id="btn-search">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="panel-main-body">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cảm biến</th>
                            <th>Giá trị</th>
                            <th>Thời gian nhận (Time)</th>
                        </tr>
                    </thead>
                    <tbody id="sensor-table-body"></tbody>
                </table>
            </div>

            <div class="pagination">
                <span class="page-item" id="btn-prev">Prev</span>
                <span class="page-info" id="page-info">Trang 1</span>
                <span class="page-item" id="btn-next">Next</span>
            </div>
        </div>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
