<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ Chỉnh Màu IoT (Editor)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f5f6fa; padding: 20px; padding-bottom: 100px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h2 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; color: #2d3436; }
        p { color: #636e72; font-size: 0.9em; margin-bottom: 20px; }

        .palette-row { 
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; 
            align-items: stretch;
        }

        .color-block-wrapper {
            flex: 1; min-width: 100px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Ô màu hiển thị */
        .color-box {
            width: 100%; height: 80px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            position: relative;
            display: flex; justify-content: center; align-items: center;
        }
        
        .color-box:hover { transform: translateY(-5px); border-color: #0984e3; }
        
        /* Icon cái bút chì để biết là sửa được */
        .color-box::after {
            content: "✏️"; font-size: 12px; position: absolute; top: 5px; right: 5px; opacity: 0.5;
        }

        /* Input màu ẩn */
        input[type="color"] { visibility: hidden; position: absolute; }

        .label { font-weight: bold; font-size: 0.9em; margin-top: 8px; text-align: center; }
        .hex-display { font-family: monospace; font-size: 0.8em; color: #666; background: #eee; padding: 2px 6px; border-radius: 4px; margin-top: 4px; }

        /* Nút Lưu */
        .fab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: white; padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            display: flex; justify-content: center; gap: 20px;
            z-index: 100;
        }
        
        .btn {
            padding: 12px 30px; font-weight: bold; border: none; border-radius: 30px; cursor: pointer; font-size: 16px;
        }
        .btn-save { background: #00b894; color: white; }
        .btn-save:hover { background: #00cec9; }

    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center;">BẢNG CHỈNH MÀU CHI TIẾT</h1>
    <p style="text-align: center;">💡 Hướng dẫn: Bấm thẳng vào ô màu để mở bảng chọn màu (Color Picker). Chỉnh đến khi ưng ý thì bấm "Lưu Code".</p>

    <div class="section">
        <h2>🌡️ Nhiệt độ (Mở rộng 8 mức)</h2>
        <div class="palette-row" id="temp-row"></div>
    </div>

    <div class="section">
        <h2>💧 Độ ẩm (Mở rộng 6 mức)</h2>
        <div class="palette-row" id="humid-row"></div>
    </div>

    <div class="section">
        <h2>☀️ Ánh sáng (Mở rộng 6 mức)</h2>
        <div class="palette-row" id="light-row"></div>
    </div>
</div>

<div class="fab-bar">
    <button class="btn btn-save" onclick="exportData()">💾 LƯU & COPY MÃ MÀU</button>
</div>

<script>
    // DỮ LIỆU KHỞI TẠO (Đã thêm các màu trung gian như bạn muốn)
    const initialData = {
        temp: [
            { l: "0°C (Băng)", c: "#81ecec" },
            { l: "15°C (Lạnh)", c: "#00cec9" },
            { l: "20°C (Mát)", c: "#00b894" },
            { l: "24°C (Se lạnh)", c: "#badc58" }, // Trung gian
            { l: "28°C (Ấm)", c: "#ffeaa7" },
            { l: "32°C (Hơi nóng)", c: "#fdcb6e" },
            { l: "36°C (Nóng)", c: "#e17055" },
            { l: "40°C (Gắt)", c: "#d63031" }
        ],
        humid: [
            { l: "20% (Rất khô)", c: "#dfe6e9" },
            { l: "40% (Khô)", c: "#74b9ff" },
            { l: "55% (Vừa)", c: "#00cec9" }, // Trung gian
            { l: "70% (Ẩm)", c: "#0984e3" },
            { l: "85% (Rất ẩm)", c: "#2980b9" }, // Trung gian
            { l: "95% (Ướt)", c: "#2c3e50" }
        ],
        light: [
            { l: "0 (Đêm)", c: "#2d3436" },
            { l: "100 (Mờ)", c: "#636e72" },
            { l: "300 (Trong nhà)", c: "#b2bec3" },
            { l: "500 (Sáng)", c: "#dfe6e9" }, // Trung gian
            { l: "700 (Rực rỡ)", c: "#f1c40f" },
            { l: "900 (Chói)", c: "#ffffcc" }
        ]
    };

    // Hàm xác định màu chữ (Đen hay Trắng) dựa trên độ sáng nền
    function getContrastYIQ(hexcolor){
        hexcolor = hexcolor.replace("#", "");
        var r = parseInt(hexcolor.substr(0,2),16);
        var g = parseInt(hexcolor.substr(2,2),16);
        var b = parseInt(hexcolor.substr(4,2),16);
        var yiq = ((r*299)+(g*587)+(b*114))/1000;
        return (yiq >= 128) ? '#2d3436' : 'white';
    }

    // Hàm render
    function renderRow(type, items) {
        const container = document.getElementById(type + '-row');
        items.forEach((item, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'color-block-wrapper';

            // Tạo input color ẩn
            const input = document.createElement('input');
            input.type = 'color';
            input.value = item.c;
            input.id = `${type}-input-${index}`;

            // Tạo ô màu hiển thị
            const box = document.createElement('div');
            box.className = 'color-box';
            box.style.backgroundColor = item.c;
            box.style.color = getContrastYIQ(item.c);
            box.innerText = "Sửa"; // Gợi ý click

            // Nhãn và mã hex
            const label = document.createElement('div');
            label.className = 'label';
            label.innerText = item.l;

            const hex = document.createElement('div');
            hex.className = 'hex-display';
            hex.id = `${type}-hex-${index}`;
            hex.innerText = item.c;

            // Sự kiện: Click vào Box -> Mở Input Color
            box.onclick = () => input.click();

            // Sự kiện: Chọn màu xong -> Cập nhật UI
            input.oninput = (e) => {
                const newColor = e.target.value;
                box.style.backgroundColor = newColor;
                box.style.color = getContrastYIQ(newColor); // Tự động đổi màu chữ
                hex.innerText = newColor;
                // Cập nhật lại vào data gốc để tí nữa export
                initialData[type][index].c = newColor; 
            };

            wrapper.appendChild(box);
            wrapper.appendChild(input); // Ẩn
            wrapper.appendChild(label);
            wrapper.appendChild(hex);
            container.appendChild(wrapper);
        });
    }

    renderRow('temp', initialData.temp);
    renderRow('humid', initialData.humid);
    renderRow('light', initialData.light);

    // Hàm xuất dữ liệu
    function exportData() {
        let resultText = "BẢNG MÀU CHỐT:\n";
        
        ['temp', 'humid', 'light'].forEach(type => {
            resultText += `\n[${type.toUpperCase()}]\n`;
            initialData[type].forEach(item => {
                resultText += `${item.l}: ${item.c}\n`;
            });
        });

        navigator.clipboard.writeText(resultText).then(() => {
            alert("Đã copy toàn bộ mã màu! \nHãy quay lại khung chat và dán (Ctrl+V) gửi cho tôi.");
        }).catch(() => {
            prompt("Copy đoạn text dưới đây:", resultText);
        });
    }
</script>

</body>
</html>
